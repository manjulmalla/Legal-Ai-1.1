{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Legal AI</title>
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <link rel="stylesheet" href="{% static 'css/pages/home.css' %}">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="auth-card__header">
            <h2 class="auth-card__title">Create an Account</h2>
            <p class="auth-card__subtitle">Sign up to personalize your Legal AI experience.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert--{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'register' %}" class="auth-card__form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" name="username" id="username" class="form-input" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" name="email" id="email" class="form-input" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label for="password1" class="form-label">Password</label>
                <input type="password" name="password1" id="password1" class="form-input" placeholder="Enter a password" required>
            </div>

            <div class="form-group">
                <label for="password2" class="form-label">Confirm Password</label>
                <input type="password" name="password2" id="password2" class="form-input" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="btn btn--primary" style="width: 100%;">Register</button>
        </form>

        <div class="auth-card__footer">
            Already have an account? <a href="{% url 'login' %}">Login here</a>
        </div>
    </div>

</body>
</html>
